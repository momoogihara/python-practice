<!DOCTYPE html>
<html>
<head>
    <title>Task List</title>

    <style>
        /* 全体のフォントと余白 */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        /* 入力欄 */
        input[type="text"] {
            padding: 8px;
            width: 250px;
        }

        /* ボタン */
        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        /* テーブル */
        table {
            border-collapse: collapse;
            width: 700px;
            margin-top: 20px;
        }

        /* ヘッダーとセル */
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        /* ヘッダー背景 */
        th {
            background-color: #f5f5f5;
        }

        /* 偶数行の背景色 */
        tr:nth-child(even) {
            background-color: #fafafa;
        }

        /* マウスを乗せた時 */
        tr:hover {
            background-color: #f0f8ff;
        }
    </style>
</head>
<body>
    <h1>タスク一覧</h1>
    <h2>タスク追加</h2>

    <!-- 新規タスク入力欄 -->
    <input type="text" id="task-input" placeholder="タスクを入力">
    <!-- 追加ボタン -->
    <button onclick="addTask()">追加</button>
    <!-- タスク一覧テーブル -->
    <table border="1">
        <thead>
            <tr>
                <th>No</th>
                <th>Title</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>
        </thead>
        
        <!-- JavaScriptで行を追加する場所 -->
        <tbody id="task_table">
        </tbody>
    </table>

    <script>

        // APIのURL
        // 相対パスなのでローカルでもEC2でも動く
         const API_URL = "/tasks";

        // ==========================================
        // 初期表示
        // ==========================================
        // ページを開いた時にタスク一覧を取得して表示
        loadTasks();
        // ==========================================
        // タスク一覧を取得してテーブルに表示
        // ==========================================
        function loadTasks() {
          fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                const table = document.getElementById("task_table");
                  // 一旦テーブルを空にする
                  table.innerHTML = "";
                // 取得したデータを1件ずつ表示
                data.forEach((task, index) => {
                    table.appendChild(createRow(task, index));
                });
            });
        }

        // ==========================================
        // 1行分の<tr>を作成
        // ==========================================
        function createRow(task,index) {
          // tr要素を作成
          const row = document.createElement("tr");
        // 行の中身を設定
        row.innerHTML = `
            <td>${index + 1}</td>
            <td class="title">${task.title}</td>
            <td><button onclick="editTask(${task.id},this)">編集</button></td>
            <td><button onclick="deleteTask(${task.id}, this)">削除</button></td>
        `;
        return row;
        }
        // POST
        function addTask() {
            // 入力欄を取得
            const input = document.getElementById("task-input");
            // 入力された文字列
            const title = input.value.trim();
             // 空文字なら何もしない
            if (!title) return;
            // POST送信    
            fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ title: title })
            })
            .then(() => {
                        input.value = "";
                        loadTasks();
            });
        }
        //編集(PUT)
        function editTask(id, btn) {
            // クリックされたボタンの属する行
            const row = btn.closest("tr");
            // 現在表示されているタイトル
            const currentTitle = row.querySelector(".title").textContent;
            // 新しいタイトルを入力
            const newTitle = prompt(
                "新しいタスク名を入力",
                currentTitle
            );

            // キャンセルまたは空文字なら終了
            if (!newTitle) return;

            // PUT送信
            fetch(`${API_URL}/${id}`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ title: newTitle })
            })
            .then(() => {
                row.querySelector(".title").textContent = newTitle;
            });
        }
        //削除
         function deleteTask(id, btn) {
            fetch(`${API_URL}/${id}`, {
                method: "DELETE"
            })
            .then(() => {
                // 行を削除
                const row = btn.closest("tr");
                row.remove();

                // No列を振り直す
                updateRowNumbers();
            });
        }
        // ==========================================
        // No列を1から振り直す
        // ==========================================
        
        function updateRowNumbers() {
        // console.log("番号更新された"); // ←追加
            const rows = document.querySelectorAll("#task_table tr");

            rows.forEach((row, index) => {
                row.children[0].textContent = index + 1;
            });
        }
        </script>
    </body>
    </html>
